name: MERN CI Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Backend Install
        working-directory: server
        run: npm install

      - name: Backend Test
        working-directory: server
        run: npm test

      - name: Frontend Install
        working-directory: client
        run: npm install

      - name: Frontend Build
        working-directory: client
        run: npm run build